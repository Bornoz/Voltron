name: Question
description: Ask a question about Voltron
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in Voltron! Please describe your question below.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: How do I configure custom protection zones?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Any steps you've already taken or docs you've read.
      placeholder: I checked the docs/BIG-PICTURE.md but couldn't find...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant links, screenshots, or code snippets.
